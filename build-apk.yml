name: Build Tap Dash APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: tap-dash-android

      - name: Make gradlew executable
        run: chmod +x tap-dash-android/android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: tap-dash-android/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TapDash-debug.apk
          path: tap-dash-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        working-directory: tap-dash-android/android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TapDash-release.apk
          path: tap-dash-android/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
